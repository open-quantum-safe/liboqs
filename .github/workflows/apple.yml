name: apple build

permissions:
  contents: read

on: [workflow_call, workflow_dispatch]

jobs:

  apple-mobile:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [OS64, TVOS]
        stfl_opt: [OFF, ON]
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # pin@v6.0.3
      - name: Generate project
        run: |
          cmake -B build --toolchain .CMake/apple.cmake -DOQS_USE_OPENSSL=OFF -DPLATFORM=${{ matrix.platform }} \
            -DOQS_ENABLE_SIG_STFL_LMS=ON -DOQS_ENABLE_SIG_STFL_XMSS=ON -DOQS_HAZARDOUS_EXPERIMENTAL_ENABLE_SIG_STFL_KEY_SIG_GEN=${{ matrix.stfl_opt }} .
      - name: Build project
        run: cmake --build build
