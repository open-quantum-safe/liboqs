name: apple build

permissions:
  contents: read

on: [workflow_call, workflow_dispatch]

jobs:

  apple-mobile:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [OS64, TVOS]
        stfl_opt: [OFF, ON]
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # pin@v7.0.0
      - name: Generate project
        run: |
          cmake -B build --toolchain .CMake/apple.cmake -DOQS_USE_OPENSSL=OFF -DPLATFORM=${{ matrix.platform }} \
            -DOQS_ENABLE_SIG_STFL_LMS=ON -DOQS_ENABLE_SIG_STFL_XMSS=ON -DOQS_HAZARDOUS_EXPERIMENTAL_ENABLE_SIG_STFL_KEY_SIG_GEN=${{ matrix.stfl_opt }} .
      - name: Build project
        run: cmake --build build
