name: Build Script Test

permissions:
  contents: read

on:
  push:
    branches: [ main, charishma_build_script ]
    paths:
      - 'build_liboqs.sh'
      - 'CMakeLists.txt'
      - 'src/**/CMakeLists.txt'
      - '.github/workflows/build-script-test.yml'
  pull_request:
    paths:
      - 'build_liboqs.sh'
      - 'CMakeLists.txt'
      - 'src/**/CMakeLists.txt'
      - '.github/workflows/build-script-test.yml'
  workflow_dispatch:

jobs:
  test-build-script:
    name: Test build script on ${{ matrix.os }} - ${{ matrix.test-name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Essential Ubuntu tests - covers core functionality
          - os: ubuntu-latest
            test-name: default-build
            script-args: ""
            description: "Default configuration (most common use case)"
          
          - os: ubuntu-latest
            test-name: minimal-build
            script-args: '--minimal-build "KEM_ml_kem_768;SIG_ml_dsa_44"'
            description: "Minimal build with specific algorithms"
          
          - os: ubuntu-latest
            test-name: shared-no-openssl
            script-args: "--shared --no-openssl"
            description: "Shared library without OpenSSL"
          
          # Cross-platform verification - one macOS test
          - os: macos-latest
            test-name: default-build
            script-args: ""
            description: "Verify script works on macOS"

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # pin@v4
      
      - name: Make build script executable
        run: chmod +x build_liboqs.sh
      
      - name: Run build script - ${{ matrix.test-name }}
        run: ./build_liboqs.sh ${{ matrix.script-args }}
      
      - name: Verify build artifacts exist
        run: |
          if [ ! -d "build" ]; then
            echo "Error: build directory not created"
            exit 1
          fi
          if [ ! -f "build/lib/liboqs.a" ] && [ ! -f "build/lib/liboqs.dylib" ] && [ ! -f "build/lib/liboqs.so" ]; then
            echo "Error: liboqs library not found"
            exit 1
          fi
          echo "✓ Build artifacts verified"
      
      - name: Run basic library test
        run: |
          cd build
          # Check if test executables exist and run a quick test
          if [ -f "tests/test_kem" ]; then
            ./tests/test_kem || echo "KEM test skipped or not applicable"
          fi
          if [ -f "tests/test_sig" ]; then
            ./tests/test_sig || echo "SIG test skipped or not applicable"
          fi

  test-script-options-coverage:
    name: Verify script covers all CMake options
    runs-on: ubuntu-latest
    container: openquantumsafe/ci-ubuntu-latest:latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # pin@v4
      
      - name: Extract CMake options from CONFIGURE.md
        run: |
          # Extract OQS_ prefixed options from CONFIGURE.md
          grep -oE 'OQS_[A-Z_]+' CONFIGURE.md | sort -u > cmake_options.txt || true
          echo "CMake options found in CONFIGURE.md:"
          cat cmake_options.txt
      
      - name: Extract options from build script
        run: |
          # Extract OQS_ prefixed options from build_liboqs.sh
          grep -oE 'OQS_[A-Z_]+' build_liboqs.sh | sort -u > script_options.txt || true
          echo "Options found in build_liboqs.sh:"
          cat script_options.txt
      
      - name: Compare coverage
        shell: bash
        run: |
          echo "Checking if build script covers major CMake options..."
          # Check for key options that should be in the script
          echo "Checking for OQS_USE_OPENSSL..."
          if grep -q "OQS_USE_OPENSSL" build_liboqs.sh; then
            echo "✓ Found: OQS_USE_OPENSSL"
          else
            echo "❌ Missing: OQS_USE_OPENSSL"
          fi
          
          echo "Checking for OQS_DIST_BUILD..."
          if grep -q "OQS_DIST_BUILD" build_liboqs.sh; then
            echo "✓ Found: OQS_DIST_BUILD"
          else
            echo "❌ Missing: OQS_DIST_BUILD"
          fi
          
          echo "Checking for OQS_MINIMAL_BUILD..."
          if grep -q "OQS_MINIMAL_BUILD" build_liboqs.sh; then
            echo "✓ Found: OQS_MINIMAL_BUILD"
          else
            echo "❌ Missing: OQS_MINIMAL_BUILD"
          fi
          
          echo "Checking for OQS_BUILD_ONLY_LIB..."
          if grep -q "OQS_BUILD_ONLY_LIB" build_liboqs.sh; then
            echo "✓ Found: OQS_BUILD_ONLY_LIB"
          else
            echo "❌ Missing: OQS_BUILD_ONLY_LIB"
          fi
          
          echo "Checking for OQS_ALGS_ENABLED..."
          if grep -q "OQS_ALGS_ENABLED" build_liboqs.sh; then
            echo "✓ Found: OQS_ALGS_ENABLED"
          else
            echo "❌ Missing: OQS_ALGS_ENABLED"
          fi
          
          echo "✓ Coverage check complete"

  test-script-help:
    name: Verify script help and usage
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # pin@v4
      
      - name: Make build script executable
        run: chmod +x build_liboqs.sh
      
      - name: Test help flag
        run: |
          ./build_liboqs.sh --help > help_output.txt
          if [ ! -s help_output.txt ]; then
            echo "Error: Help output is empty"
            exit 1
          fi
          echo "✓ Help flag works"
          cat help_output.txt
      
      - name: Test invalid option handling
        run: |
          if ./build_liboqs.sh --invalid-option 2>&1 | grep -q "Unknown option"; then
            echo "✓ Invalid option handling works"
          else
            echo "Error: Script should reject invalid options"
            exit 1

  detect-outdated-script:
    name: Detect if build script is outdated
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # pin@v4
        with:
          fetch-depth: 0  # Need full history to compare commit dates
      
      - name: Check if script is outdated
        id: check_staleness
        shell: bash
        run: |
          # Get last commit timestamp for each file
          CMAKE_DATE=$(git log -1 --format=%ct -- CMakeLists.txt 2>/dev/null || echo 0)
          CONFIGURE_DATE=$(git log -1 --format=%ct -- CONFIGURE.md 2>/dev/null || echo 0)
          SCRIPT_DATE=$(git log -1 --format=%ct -- build_liboqs.sh 2>/dev/null || echo 0)
          
          echo "CMakeLists.txt last modified: $(date -d @$CMAKE_DATE 2>/dev/null || date -r $CMAKE_DATE)"
          echo "CONFIGURE.md last modified: $(date -d @$CONFIGURE_DATE 2>/dev/null || date -r $CONFIGURE_DATE)"
          echo "build_liboqs.sh last modified: $(date -d @$SCRIPT_DATE 2>/dev/null || date -r $SCRIPT_DATE)"
          
          if [ "$CMAKE_DATE" -gt "$SCRIPT_DATE" ] || [ "$CONFIGURE_DATE" -gt "$SCRIPT_DATE" ]; then
            echo "outdated=true" >> $GITHUB_OUTPUT
            echo "⚠️ Build script is outdated!"
            exit 0
          else
            echo "outdated=false" >> $GITHUB_OUTPUT
            echo "✓ Build script is up to date"
          fi
      
      - name: Extract missing options from CMakeLists.txt
        if: steps.check_staleness.outputs.outdated == 'true'
        id: extract_options
        shell: bash
        run: |
          echo "## 🔍 Checking for Missing Options" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          MISSING_COUNT=0
          
          # Extract all option() declarations from CMakeLists.txt
          echo "### Options in CMakeLists.txt:" >> $GITHUB_STEP_SUMMARY
          grep "^option(OQS_" CMakeLists.txt | while IFS= read -r line; do
            # Extract option name (e.g., OQS_USE_OPENSSL from "option(OQS_USE_OPENSSL ...")
            OPTION_NAME=$(echo "$line" | sed -E 's/option\(([A-Z_]+).*/\1/')
            
            # Check if option exists in build script
            if grep -q "$OPTION_NAME" build_liboqs.sh; then
              echo "- ✅ \`$OPTION_NAME\` - Found in script" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ❌ \`$OPTION_NAME\` - **MISSING from script**" >> $GITHUB_STEP_SUMMARY
              MISSING_COUNT=$((MISSING_COUNT + 1))
            fi
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Summary:" >> $GITHUB_STEP_SUMMARY
          if [ $MISSING_COUNT -gt 0 ]; then
            echo "- **$MISSING_COUNT option(s) missing** from build_liboqs.sh" >> $GITHUB_STEP_SUMMARY
            echo "missing_count=$MISSING_COUNT" >> $GITHUB_OUTPUT
          else
            echo "- ✅ All CMake options are present in the script" >> $GITHUB_STEP_SUMMARY
            echo "missing_count=0" >> $GITHUB_OUTPUT
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Recommended Actions:" >> $GITHUB_STEP_SUMMARY
          echo "1. Review the missing options above" >> $GITHUB_STEP_SUMMARY
          echo "2. Update \`build_liboqs.sh\` to add support for new options" >> $GITHUB_STEP_SUMMARY
          echo "3. Update the help text and usage examples" >> $GITHUB_STEP_SUMMARY
          echo "4. Test the changes locally before committing" >> $GITHUB_STEP_SUMMARY
      
      - name: Create GitHub issue for outdated script
        if: steps.check_staleness.outputs.outdated == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # pin@v7
        with:
          script: |
            // Check if an issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'build-script-outdated'
            });
            
            if (issues.data.length > 0) {
              console.log('Issue already exists, updating it...');
              const issue = issues.data[0];
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `🔄 **Update**: Build script is still outdated as of ${new Date().toISOString()}
                
                See the latest [workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId}) for details.`
              });
            } else {
              console.log('Creating new issue...');
              
              const missingCount = '${{ steps.extract_options.outputs.missing_count }}';
              
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🤖 Build script needs update - configuration files have changed',
                body: `## Build Script Outdated
                
                The build script \`build_liboqs.sh\` appears to be outdated compared to the configuration files.
                
                ### Details:
                - **CMakeLists.txt** or **CONFIGURE.md** have been modified more recently than the build script
                ${missingCount > 0 ? `- **${missingCount} option(s)** are missing from the script` : ''}
                
                ### Action Required:
                1. Review new/changed options in \`CMakeLists.txt\`
                2. Update \`build_liboqs.sh\` to include new options:
                   - Add new command-line flags
                   - Update the usage/help text
                   - Add examples if needed
                3. Update the staleness check if needed
                4. Test the changes locally:
                   \`\`\`bash
                   ./build_liboqs.sh --help
                   ./build_liboqs.sh --new-option
                   \`\`\`
                5. Commit and push the changes
                
                ### Workflow Details:
                - Workflow run: [View details](${context.payload.repository.html_url}/actions/runs/${context.runId})
                - Triggered by: ${context.payload.head_commit?.message || 'Unknown commit'}
                
                ### Note:
                This issue was automatically created by the CI system. It will be updated if the script remains outdated after subsequent commits.`,
                labels: ['maintenance', 'build-script-outdated', 'automated']
              });
            }
          fi

  test-script-syntax:
    name: Verify script syntax and shellcheck
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # pin@v4
      
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      
      - name: Check bash syntax
        run: bash -n build_liboqs.sh
      
      - name: Run shellcheck
        run: |
          shellcheck build_liboqs.sh || echo "Shellcheck warnings found (non-blocking)"
